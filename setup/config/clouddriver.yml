server:
  port: 7002

redis:
  connection: redis://redis:6379

services:
  front50:
    baseUrl: http://front50:8080
  fiat:
    enabled: true
    baseUrl: http://fiat:7003

# Artifact configuration — required for CVE-2026-32604
artifacts:
  enabled: true
  http:
    enabled: true
    accounts:
      - name: test-http-account
        username: testuser
        password: supersecretpassword
  github:
    enabled: true
    accounts:
      - name: test-github-account
        token: ghp_testtoken123456789abcdef
  git-repo:
    enabled: true
    accounts:
      - name: test-git-repo
        username: gituser
        password: gitpassword

aws:
  enabled: true
  accessKeyId: AKIAIOSFODNN7EXAMPLE
  secretAccessKey: wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY
  # availabilityZones must be set to prevent live EC2 describeAvailabilityZones
  # calls during startup — those would fail with fake credentials and cause the
  # account to be silently dropped from the credentials repository.
  defaultRegions:
    - name: us-east-1
      availabilityZones:
        - us-east-1a
        - us-east-1b
        - us-east-1c
  accounts:
    - name: prod-aws
      accountId: '123456789012'
      environment: production
      accountType: main
      assumeRole: role/SpinnakerManaged
      regions:
        - name: us-east-1
          availabilityZones:
            - us-east-1a
            - us-east-1b
            - us-east-1c

# Elasticsearch for entity tags
resilience4j.retry.instances.default:
  maxAttempts: 1

management.health.elasticsearch.enabled: false

swagger:
  enabled: true
  title: clouddriver

spring:
  mvc:
    pathmatch:
      matching-strategy: ANT_PATH_MATCHER
