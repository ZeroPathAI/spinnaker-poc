server:
  port: 7003

redis:
  connection: redis://redis:6379

fiat:
  write-mode:
    enabled: true
  admin:
    roles:
      - admin

auth:
  group-membership:
    service: ldap
    ldap:
      url: ldap://ldap:389
      managerDn: cn=admin,dc=spinnaker,dc=test
      managerPassword: ldapadmin
      userSearchBase: ou=users,dc=spinnaker,dc=test
      groupSearchBase: ou=groups,dc=spinnaker,dc=test
      groupSearchFilter: (uniqueMember={0})
      groupRoleAttributes: cn
      userDnPattern: uid={0},ou=users,dc=spinnaker,dc=test

services:
  front50:
    base-url: http://front50:8080
  clouddriver:
    base-url: http://clouddriver:7002
  igor:
    base-url: http://localhost:8088
    enabled: false

logging:
  config: classpath:logback-defaults.xml

spring:
  mvc:
    pathmatch:
      matching-strategy: ANT_PATH_MATCHER
