x-spinnaker-service: &spinnaker-defaults
  image: spinnaker-base:local
  restart: unless-stopped
  extra_hosts:
    - "host.docker.internal:host-gateway"
  networks:
    - spinnaker

services:
  # --- Infrastructure ---

  redis:
    image: redis:7-alpine
    # No host port — only accessible within the Docker network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - spinnaker

  mysql:
    image: mysql:8.0
    # No host port — only accessible within the Docker network
    environment:
      MYSQL_ROOT_PASSWORD: spinnaker
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pspinnaker"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - spinnaker

  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - spinnaker

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/front50 &&
      exit 0
      "
    networks:
      - spinnaker

  ldap:
    image: osixia/openldap:1.5.0
    environment:
      LDAP_ORGANISATION: "Spinnaker Test"
      LDAP_DOMAIN: "spinnaker.test"
      LDAP_ADMIN_PASSWORD: "ldapadmin"
    volumes:
      - ./ldap-seed.ldif:/container/service/slapd/assets/config/bootstrap/ldif/custom/seed.ldif:ro
    command: --copy-service
    healthcheck:
      test: ["CMD", "ldapsearch", "-x", "-H", "ldap://localhost", "-b", "dc=spinnaker,dc=test", "-D", "cn=admin,dc=spinnaker,dc=test", "-w", "ldapadmin", "(objectClass=organization)"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - spinnaker

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.15
    # No host port — only accessible within the Docker network
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms256m -Xmx256m"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9200/_cluster/health"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - spinnaker

  # --- Spinnaker Services ---

  front50:
    <<: *spinnaker-defaults
    volumes:
      - ${SRC_DIR:?SRC_DIR must be set}/front50/front50-web/build/install/front50:/opt/front50:ro
      - ./config/front50.yml:/opt/spinnaker/config/front50.yml:ro
    environment:
      SPRING_CONFIG_ADDITIONAL_LOCATION: "file:/opt/spinnaker/config/"
      JAVA_OPTS: "-Xms256m -Xmx512m"
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    command: ["/opt/front50/bin/front50"]

  fiat:
    <<: *spinnaker-defaults
    volumes:
      - ${SRC_DIR:?}/fiat/fiat-web/build/install/fiat:/opt/fiat:ro
      - ./config/fiat.yml:/opt/spinnaker/config/fiat.yml:ro
    environment:
      SPRING_CONFIG_ADDITIONAL_LOCATION: "file:/opt/spinnaker/config/"
      JAVA_OPTS: "-Xms256m -Xmx512m"
    ports:
      - "7003:7003"
    depends_on:
      redis:
        condition: service_healthy
      front50:
        condition: service_healthy
      ldap:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:7003/health"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    command: ["/opt/fiat/bin/fiat"]

  clouddriver:
    <<: *spinnaker-defaults
    volumes:
      - ${SRC_DIR:?}/clouddriver/clouddriver-web/build/install/clouddriver:/opt/clouddriver:ro
      - ./config/clouddriver.yml:/opt/spinnaker/config/clouddriver.yml:ro
    environment:
      SPRING_CONFIG_ADDITIONAL_LOCATION: "file:/opt/spinnaker/config/"
      JAVA_OPTS: "-Xms512m -Xmx1g"
    ports:
      - "7002:7002"
    depends_on:
      redis:
        condition: service_healthy
      front50:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:7002/health"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 90s
    command: ["/opt/clouddriver/bin/clouddriver"]

  orca:
    <<: *spinnaker-defaults
    volumes:
      - ${SRC_DIR:?}/orca/orca-web/build/install/orca:/opt/orca:ro
      - ./config/orca.yml:/opt/spinnaker/config/orca.yml:ro
    environment:
      SPRING_CONFIG_ADDITIONAL_LOCATION: "file:/opt/spinnaker/config/"
      JAVA_OPTS: "-Xms512m -Xmx1g"
    ports:
      - "8083:8083"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      front50:
        condition: service_healthy
      clouddriver:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8083/health"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 90s
    command: ["/opt/orca/bin/orca"]

  echo:
    <<: *spinnaker-defaults
    volumes:
      - ${SRC_DIR:?}/echo/echo-web/build/install/echo:/opt/echo:ro
      - ./config/echo.yml:/opt/spinnaker/config/echo.yml:ro
    environment:
      SPRING_CONFIG_ADDITIONAL_LOCATION: "file:/opt/spinnaker/config/"
      JAVA_OPTS: "-Xms256m -Xmx512m"
    ports:
      - "8089:8089"
    depends_on:
      redis:
        condition: service_healthy
      front50:
        condition: service_healthy
      orca:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8089/health"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    command: ["/opt/echo/bin/echo"]

  gate:
    <<: *spinnaker-defaults
    volumes:
      - ${SRC_DIR:?}/gate/gate-web/build/install/gate:/opt/gate:ro
      - ./config/gate.yml:/opt/spinnaker/config/gate.yml:ro
      - ./plugins:/opt/plugins
    environment:
      SPRING_CONFIG_ADDITIONAL_LOCATION: "file:/opt/spinnaker/config/"
      JAVA_OPTS: "-Xms256m -Xmx512m"
    ports:
      - "8084:8084"
    depends_on:
      redis:
        condition: service_healthy
      front50:
        condition: service_healthy
      clouddriver:
        condition: service_healthy
      orca:
        condition: service_healthy
      fiat:
        condition: service_healthy
      echo:
        condition: service_healthy
      ldap:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8084/health"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    command: ["/opt/gate/bin/gate"]

volumes:
  mysql-data:

networks:
  spinnaker:
    driver: bridge
    enable_ipv6: true
    ipam:
      config:
        - subnet: 172.29.0.0/16
        - subnet: fd00:dead:beef::/48
