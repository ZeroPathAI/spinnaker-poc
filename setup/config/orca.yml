server:
  port: 8083

front50:
  enabled: true
  baseUrl: http://front50:8080

oort:
  baseUrl: http://clouddriver:7002
mort:
  baseUrl: http://clouddriver:7002
kato:
  baseUrl: http://clouddriver:7002

echo:
  enabled: true
  baseUrl: http://echo:8089

igor:
  enabled: false

bakery:
  enabled: false

kayenta:
  enabled: false

services:
  fiat:
    enabled: true
    baseUrl: http://fiat:7003

redis:
  connection: redis://redis:6379

# Use SQL for execution persistence
sql:
  enabled: true
  connectionPools:
    default:
      default: true
      jdbcUrl: jdbc:mysql://mysql:3306/orca
      user: root
      password: spinnaker
  migration:
    jdbcUrl: jdbc:mysql://mysql:3306/orca
    user: root
    password: spinnaker

executionRepository:
  sql:
    enabled: true
  redis:
    enabled: false

# Redis for keiko work queue
keiko:
  queue:
    redis:
      enabled: true
    fillExecutorEachCycle: true

# Webhook stage
webhook:
  stage:
    enabled: true

# Pinned server group poller
pollers:
  restore-pinned-server-groups:
    enabled: true

# Pipeline templates
pipeline-templates:
  enabled: true

spring:
  mvc:
    pathmatch:
      matching-strategy: ANT_PATH_MATCHER
